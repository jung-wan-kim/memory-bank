<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="lbG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/><stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="lgG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#238636"/><stop offset="100%" style="stop-color:#3fb950"/>
    </linearGradient>
    <linearGradient id="lpG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/><stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <filter id="ls1"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/></filter>
    <marker id="la1" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="8" orient="auto"><path d="M0 0L10 3L0 6z" fill="#3fb950"/></marker>
    <marker id="la2" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="8" orient="auto"><path d="M0 0L10 3L0 6z" fill="#f85149"/></marker>
    <marker id="la3" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="8" orient="auto"><path d="M0 0L10 3L0 6z" fill="#8b949e"/></marker>
  </defs>

  <rect width="800" height="500" rx="12" fill="url(#lbG)"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" fill="#e6edf3" font-family="system-ui, sans-serif" font-size="18" font-weight="bold">Scope Isolation + Memory Strengthening</text>
  <text x="400" y="50" text-anchor="middle" fill="#8b949e" font-family="system-ui, sans-serif" font-size="12">Project facts stay isolated. Global facts are shared. Repeated facts get stronger.</text>

  <!-- ===== LEFT HALF: Scope Isolation ===== -->
  <rect x="15" y="65" width="380" height="365" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="205" y="88" text-anchor="middle" fill="#e6edf3" font-family="system-ui, sans-serif" font-size="14" font-weight="bold">Scope Isolation</text>
  <text x="205" y="104" text-anchor="middle" fill="#8b949e" font-family="system-ui, sans-serif" font-size="10">Each fact is scoped at extraction time</text>

  <!-- Global Scope -->
  <rect x="30" y="118" width="350" height="80" rx="8" fill="#161b22" stroke="#d2a8ff" stroke-width="2"/>
  <text x="55" y="138" fill="#d2a8ff" font-family="system-ui, sans-serif" font-size="12" font-weight="bold">GLOBAL SCOPE (User-wide)</text>
  <text x="55" y="156" fill="#e6edf3" font-family="'SF Mono', monospace" font-size="10">"Named exports only"</text>
  <text x="55" y="172" fill="#e6edf3" font-family="'SF Mono', monospace" font-size="10">"Korean responses"</text>
  <text x="55" y="188" fill="#8b949e" font-family="system-ui, sans-serif" font-size="9">Visible in ALL projects</text>

  <!-- Arrows down from global -->
  <line x1="130" y1="198" x2="130" y2="218" stroke="#3fb950" stroke-width="1.5" marker-end="url(#la1)"/>
  <line x1="280" y1="198" x2="280" y2="218" stroke="#3fb950" stroke-width="1.5" marker-end="url(#la1)"/>
  <text x="100" y="212" fill="#3fb950" font-family="system-ui, sans-serif" font-size="8" font-weight="bold">shared</text>
  <text x="250" y="212" fill="#3fb950" font-family="system-ui, sans-serif" font-size="8" font-weight="bold">shared</text>

  <!-- Project A -->
  <rect x="30" y="222" width="165" height="90" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="45" y="242" fill="#58a6ff" font-family="system-ui, sans-serif" font-size="11" font-weight="bold">Flutter App</text>
  <text x="45" y="260" fill="#e6edf3" font-family="'SF Mono', monospace" font-size="9">"Use Riverpod"</text>
  <text x="45" y="276" fill="#e6edf3" font-family="'SF Mono', monospace" font-size="9">"GoRouter nav"</text>
  <text x="45" y="302" fill="#8b949e" font-family="system-ui, sans-serif" font-size="8">Sees: Flutter + Global only</text>

  <!-- X between projects -->
  <line x1="200" y1="255" x2="216" y2="275" stroke="#f85149" stroke-width="3"/>
  <line x1="216" y1="255" x2="200" y2="275" stroke="#f85149" stroke-width="3"/>
  <text x="208" y="295" text-anchor="middle" fill="#f85149" font-family="system-ui, sans-serif" font-size="8" font-weight="bold">NEVER</text>

  <!-- Project B -->
  <rect x="215" y="222" width="165" height="90" rx="8" fill="#161b22" stroke="#f0883e" stroke-width="1.5"/>
  <text x="230" y="242" fill="#f0883e" font-family="system-ui, sans-serif" font-size="11" font-weight="bold">React Dashboard</text>
  <text x="230" y="260" fill="#e6edf3" font-family="'SF Mono', monospace" font-size="9">"Use Redux Toolkit"</text>
  <text x="230" y="276" fill="#e6edf3" font-family="'SF Mono', monospace" font-size="9">"React Router v6"</text>
  <text x="230" y="302" fill="#8b949e" font-family="system-ui, sans-serif" font-size="8">Sees: React + Global only</text>

  <!-- Key insight box -->
  <rect x="30" y="325" width="350" height="44" rx="6" fill="#f85149" opacity="0.08"/>
  <rect x="30" y="325" width="350" height="44" rx="6" fill="none" stroke="#f85149" stroke-width="1"/>
  <text x="205" y="345" text-anchor="middle" fill="#e6edf3" font-family="system-ui, sans-serif" font-size="11" font-weight="bold">Why this matters:</text>
  <text x="205" y="361" text-anchor="middle" fill="#8b949e" font-family="system-ui, sans-serif" font-size="10">Claude never confuses Riverpod with Redux across projects</text>

  <!-- What context sees -->
  <rect x="30" y="378" width="165" height="42" rx="6" fill="#161b22" stroke="#58a6ff" stroke-width="1"/>
  <text x="112" y="395" text-anchor="middle" fill="#58a6ff" font-family="system-ui, sans-serif" font-size="9" font-weight="bold">Flutter context sees:</text>
  <text x="112" y="411" text-anchor="middle" fill="#8b949e" font-family="'SF Mono', monospace" font-size="8">Riverpod + Named exports + Korean</text>

  <rect x="215" y="378" width="165" height="42" rx="6" fill="#161b22" stroke="#f0883e" stroke-width="1"/>
  <text x="297" y="395" text-anchor="middle" fill="#f0883e" font-family="system-ui, sans-serif" font-size="9" font-weight="bold">React context sees:</text>
  <text x="297" y="411" text-anchor="middle" fill="#8b949e" font-family="'SF Mono', monospace" font-size="8">Redux + Named exports + Korean</text>

  <!-- ===== RIGHT HALF: Memory Strengthening ===== -->
  <rect x="405" y="65" width="380" height="365" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="595" y="88" text-anchor="middle" fill="#e6edf3" font-family="system-ui, sans-serif" font-size="14" font-weight="bold">Memory Gets Stronger Over Time</text>
  <text x="595" y="104" text-anchor="middle" fill="#8b949e" font-family="system-ui, sans-serif" font-size="10">Repeated confirmation = stronger memory</text>

  <!-- Session timeline -->
  <!-- Session 1 -->
  <rect x="420" y="118" width="350" height="48" rx="6" fill="#161b22" stroke="#58a6ff" stroke-width="1"/>
  <text x="430" y="136" fill="#58a6ff" font-family="system-ui, sans-serif" font-size="10" font-weight="bold">Session 1</text>
  <text x="430" y="153" fill="#e6edf3" font-family="'SF Mono', monospace" font-size="9">"Use Riverpod for state"</text>
  <rect x="700" y="128" width="55" height="22" rx="4" fill="#161b22" stroke="#8b949e" stroke-width="1"/>
  <text x="727" y="143" text-anchor="middle" fill="#8b949e" font-family="'SF Mono', monospace" font-size="10">count:1</text>

  <!-- Arrow down -->
  <line x1="595" y1="166" x2="595" y2="180" stroke="#8b949e" stroke-width="1.5" marker-end="url(#la3)"/>

  <!-- Session 5: same fact again -->
  <rect x="420" y="183" width="350" height="60" rx="6" fill="#161b22" stroke="#f0883e" stroke-width="1"/>
  <text x="430" y="201" fill="#f0883e" font-family="system-ui, sans-serif" font-size="10" font-weight="bold">Session 5 — Similar fact extracted</text>
  <text x="430" y="218" fill="#e6edf3" font-family="'SF Mono', monospace" font-size="9">"Riverpod with code generation"</text>
  <text x="430" y="233" fill="#8b949e" font-family="system-ui, sans-serif" font-size="9">Vector similarity: 0.92 → DUPLICATE detected → merged</text>
  <rect x="700" y="193" width="55" height="22" rx="4" fill="#238636" opacity="0.3" stroke="#3fb950" stroke-width="1"/>
  <text x="727" y="208" text-anchor="middle" fill="#3fb950" font-family="'SF Mono', monospace" font-size="10" font-weight="bold">count:2</text>

  <!-- Arrow down -->
  <line x1="595" y1="243" x2="595" y2="257" stroke="#8b949e" stroke-width="1.5" marker-end="url(#la3)"/>

  <!-- Session N: strong memory -->
  <rect x="420" y="260" width="350" height="55" rx="6" fill="#161b22" stroke="#3fb950" stroke-width="2"/>
  <rect x="420" y="260" width="350" height="55" rx="6" fill="#3fb950" opacity="0.05"/>
  <text x="430" y="278" fill="#3fb950" font-family="system-ui, sans-serif" font-size="10" font-weight="bold">Session 20 — Strong long-term memory</text>
  <text x="430" y="295" fill="#e6edf3" font-family="'SF Mono', monospace" font-size="9" font-weight="bold">"Use Riverpod with code generation"</text>
  <text x="430" y="308" fill="#8b949e" font-family="system-ui, sans-serif" font-size="9">Always in top 10 → Always injected into context</text>
  <rect x="693" y="270" width="62" height="22" rx="4" fill="#238636" stroke="#3fb950" stroke-width="1.5"/>
  <text x="724" y="285" text-anchor="middle" fill="#fff" font-family="'SF Mono', monospace" font-size="10" font-weight="bold">count:12</text>

  <!-- Consolidation outcomes -->
  <text x="595" y="338" text-anchor="middle" fill="#e6edf3" font-family="system-ui, sans-serif" font-size="11" font-weight="bold">When similar facts are found:</text>

  <rect x="420" y="348" width="170" height="32" rx="4" fill="#161b22" stroke="#58a6ff" stroke-width="1"/>
  <text x="505" y="368" text-anchor="middle" fill="#58a6ff" font-family="system-ui, sans-serif" font-size="10" font-weight="bold">DUPLICATE → merge (count++)</text>

  <rect x="600" y="348" width="170" height="32" rx="4" fill="#161b22" stroke="#f85149" stroke-width="1"/>
  <text x="685" y="368" text-anchor="middle" fill="#f85149" font-family="system-ui, sans-serif" font-size="10" font-weight="bold">CONTRADICT → replace</text>

  <rect x="420" y="388" width="170" height="32" rx="4" fill="#161b22" stroke="#f0883e" stroke-width="1"/>
  <text x="505" y="408" text-anchor="middle" fill="#f0883e" font-family="system-ui, sans-serif" font-size="10" font-weight="bold">EVOLVE → update + log</text>

  <rect x="600" y="388" width="170" height="32" rx="4" fill="#161b22" stroke="#3fb950" stroke-width="1"/>
  <text x="685" y="408" text-anchor="middle" fill="#3fb950" font-family="system-ui, sans-serif" font-size="10" font-weight="bold">INDEPENDENT → keep both</text>

  <!-- Bottom: overall insight -->
  <rect x="15" y="440" width="770" height="48" rx="8" fill="#161b22" stroke="#d2a8ff" stroke-width="1"/>
  <text x="400" y="462" text-anchor="middle" fill="#e6edf3" font-family="system-ui, sans-serif" font-size="13" font-weight="bold">Result: Claude remembers your decisions, respects project boundaries, and evolves with you</text>
  <text x="400" y="480" text-anchor="middle" fill="#8b949e" font-family="system-ui, sans-serif" font-size="10">All automatic — no manual configuration needed. Memory builds from every conversation.</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="lBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/><stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="lBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f6feb"/><stop offset="100%" style="stop-color:#58a6ff"/>
    </linearGradient>
    <linearGradient id="lGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#238636"/><stop offset="100%" style="stop-color:#3fb950"/>
    </linearGradient>
    <linearGradient id="lPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/><stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="lOrange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d18616"/><stop offset="100%" style="stop-color:#f0883e"/>
    </linearGradient>
    <filter id="ls"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/></filter>
    <marker id="la" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="8" markerHeight="6" orient="auto"><path d="M0 0L10 3L0 6z" fill="#8b949e"/></marker>
    <marker id="lg" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="8" markerHeight="6" orient="auto"><path d="M0 0L10 3L0 6z" fill="#3fb950"/></marker>
    <marker id="lr" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="8" markerHeight="6" orient="auto"><path d="M0 0L10 3L0 6z" fill="#f85149"/></marker>
  </defs>

  <rect width="800" height="450" rx="12" fill="url(#lBg)"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" fill="#e6edf3" font-family="system-ui, sans-serif" font-size="18" font-weight="bold">From Conversations to Long-Term Memory</text>
  <text x="400" y="50" text-anchor="middle" fill="#8b949e" font-family="system-ui, sans-serif" font-size="12">How facts grow stronger over time through repeated confirmation</text>

  <!-- ===== PHASE 1: Day 1 ===== -->
  <rect x="15" y="65" width="240" height="175" rx="8" fill="#0d1117" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="135" y="85" text-anchor="middle" fill="#58a6ff" font-family="system-ui, sans-serif" font-size="13" font-weight="bold">Session 1: First Extraction</text>

  <!-- Conversation -->
  <rect x="30" y="98" width="210" height="50" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="40" y="114" fill="#58a6ff" font-family="system-ui, sans-serif" font-size="9">User: "Use Riverpod for state"</text>
  <text x="40" y="130" fill="#3fb950" font-family="system-ui, sans-serif" font-size="9">Claude: "Setting up Riverpod..."</text>
  <text x="40" y="143" fill="#8b949e" font-family="system-ui, sans-serif" font-size="8">Flutter project conversation</text>

  <!-- Arrow down -->
  <line x1="135" y1="148" x2="135" y2="162" stroke="#d2a8ff" stroke-width="1.5" marker-end="url(#la)"/>
  <text x="160" y="158" fill="#d2a8ff" font-family="system-ui, sans-serif" font-size="8">Haiku extracts</text>

  <!-- New fact -->
  <rect x="30" y="165" width="210" height="35" rx="6" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="40" y="180" fill="#3fb950" font-family="system-ui, sans-serif" font-size="9" font-weight="bold">FACT: "Use Riverpod for state"</text>
  <text x="40" y="193" fill="#8b949e" font-family="system-ui, sans-serif" font-size="8">category: decision | scope: project | count: 1</text>

  <!-- Result label -->
  <text x="135" y="220" text-anchor="middle" fill="#8b949e" font-family="system-ui, sans-serif" font-size="9">New fact stored in DB</text>
  <text x="135" y="232" text-anchor="middle" fill="#8b949e" font-family="system-ui, sans-serif" font-size="8">with 384-dim embedding vector</text>

  <!-- Arrow to Phase 2 -->
  <line x1="255" y1="152" x2="278" y2="152" stroke="#8b949e" stroke-width="2" marker-end="url(#la)"/>

  <!-- ===== PHASE 2: Day 5 ===== -->
  <rect x="280" y="65" width="240" height="280" rx="8" fill="#0d1117" stroke="#f0883e" stroke-width="1.5"/>
  <text x="400" y="85" text-anchor="middle" fill="#f0883e" font-family="system-ui, sans-serif" font-size="13" font-weight="bold">Session 5: Consolidation</text>

  <!-- New conversation -->
  <rect x="295" y="98" width="210" height="40" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="305" y="114" fill="#58a6ff" font-family="system-ui, sans-serif" font-size="9">User: "Riverpod providers for auth"</text>
  <text x="305" y="128" fill="#8b949e" font-family="system-ui, sans-serif" font-size="8">Similar topic detected</text>

  <!-- Arrow: extract -->
  <line x1="400" y1="138" x2="400" y2="152" stroke="#d2a8ff" stroke-width="1.5" marker-end="url(#la)"/>

  <!-- New extracted fact -->
  <rect x="295" y="155" width="210" height="28" rx="4" fill="#161b22" stroke="#d2a8ff" stroke-width="1"/>
  <text x="305" y="173" fill="#d2a8ff" font-family="system-ui, sans-serif" font-size="9">New: "Use Riverpod for auth state"</text>

  <!-- Vector search -->
  <line x1="400" y1="183" x2="400" y2="197" stroke="#3fb950" stroke-width="1.5" marker-end="url(#lg)"/>
  <text x="415" y="193" fill="#3fb950" font-family="system-ui, sans-serif" font-size="8">vector search</text>

  <!-- Similarity match -->
  <rect x="295" y="200" width="210" height="38" rx="6" fill="#161b22" stroke="#f0883e" stroke-width="1.5"/>
  <text x="305" y="215" fill="#f0883e" font-family="system-ui, sans-serif" font-size="9" font-weight="bold">Match found! similarity: 0.92</text>
  <text x="305" y="228" fill="#8b949e" font-family="system-ui, sans-serif" font-size="8">Existing: "Use Riverpod for state"</text>

  <!-- Haiku decides -->
  <line x1="400" y1="238" x2="400" y2="252" stroke="#d2a8ff" stroke-width="1.5" marker-end="url(#la)"/>
  <text x="415" y="248" fill="#d2a8ff" font-family="system-ui, sans-serif" font-size="8">Haiku classifies</text>

  <!-- 4 outcomes -->
  <rect x="295" y="255" width="100" height="38" rx="4" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="345" y="271" text-anchor="middle" fill="#58a6ff" font-family="system-ui, sans-serif" font-size="9" font-weight="bold">DUPLICATE</text>
  <text x="345" y="284" text-anchor="middle" fill="#8b949e" font-family="system-ui, sans-serif" font-size="8">count: 1 → 2</text>

  <rect x="405" y="255" width="100" height="38" rx="4" fill="#161b22" stroke="#f85149" stroke-width="1"/>
  <text x="455" y="271" text-anchor="middle" fill="#f85149" font-family="system-ui, sans-serif" font-size="9">CONTRADICT</text>
  <text x="455" y="284" text-anchor="middle" fill="#8b949e" font-family="system-ui, sans-serif" font-size="8">replace + log</text>

  <rect x="295" y="298" width="100" height="38" rx="4" fill="#161b22" stroke="#f0883e" stroke-width="1"/>
  <text x="345" y="314" text-anchor="middle" fill="#f0883e" font-family="system-ui, sans-serif" font-size="9">EVOLUTION</text>
  <text x="345" y="327" text-anchor="middle" fill="#8b949e" font-family="system-ui, sans-serif" font-size="8">update + log</text>

  <rect x="405" y="298" width="100" height="38" rx="4" fill="#161b22" stroke="#3fb950" stroke-width="1"/>
  <text x="455" y="314" text-anchor="middle" fill="#3fb950" font-family="system-ui, sans-serif" font-size="9">INDEPENDENT</text>
  <text x="455" y="327" text-anchor="middle" fill="#8b949e" font-family="system-ui, sans-serif" font-size="8">keep both</text>

  <!-- Arrow to Phase 3 -->
  <line x1="520" y1="200" x2="543" y2="200" stroke="#8b949e" stroke-width="2" marker-end="url(#la)"/>

  <!-- ===== PHASE 3: Day N ===== -->
  <rect x="545" y="65" width="240" height="175" rx="8" fill="#0d1117" stroke="#3fb950" stroke-width="1.5"/>
  <text x="665" y="85" text-anchor="middle" fill="#3fb950" font-family="system-ui, sans-serif" font-size="13" font-weight="bold">Session N: Strong Memory</text>

  <!-- Strong facts with high counts -->
  <rect x="560" y="100" width="210" height="30" rx="4" fill="#161b22" stroke="#3fb950" stroke-width="2"/>
  <text x="570" y="119" fill="#3fb950" font-family="system-ui, sans-serif" font-size="9" font-weight="bold">"Use Riverpod for state"</text>
  <rect x="730" y="105" width="32" height="18" rx="9" fill="#238636"/>
  <text x="746" y="118" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="9" font-weight="bold">x12</text>

  <rect x="560" y="135" width="210" height="30" rx="4" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="570" y="154" fill="#e6edf3" font-family="system-ui, sans-serif" font-size="9">"GoRouter for navigation"</text>
  <rect x="730" y="140" width="32" height="18" rx="9" fill="#238636"/>
  <text x="746" y="153" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="9" font-weight="bold">x8</text>

  <rect x="560" y="170" width="210" height="30" rx="4" fill="#161b22" stroke="#58a6ff" stroke-width="1"/>
  <text x="570" y="189" fill="#e6edf3" font-family="system-ui, sans-serif" font-size="9">"Feature-first directory"</text>
  <rect x="730" y="175" width="32" height="18" rx="9" fill="#1f6feb"/>
  <text x="746" y="188" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="9" font-weight="bold">x5</text>

  <!-- Strength indicator -->
  <text x="665" y="218" text-anchor="middle" fill="#3fb950" font-family="system-ui, sans-serif" font-size="10" font-weight="bold">Higher count = Stronger memory</text>
  <text x="665" y="233" text-anchor="middle" fill="#8b949e" font-family="system-ui, sans-serif" font-size="9">Top 10 by count injected at start</text>

  <!-- ===== BOTTOM: Evolution Example ===== -->
  <rect x="545" y="250" width="240" height="95" rx="8" fill="#0d1117" stroke="#f0883e" stroke-width="1"/>
  <text x="665" y="270" text-anchor="middle" fill="#f0883e" font-family="system-ui, sans-serif" font-size="11" font-weight="bold">Evolution Tracking Example</text>

  <text x="560" y="290" fill="#8b949e" font-family="system-ui, sans-serif" font-size="9">v1: "Use Provider for state"</text>
  <text x="700" y="290" fill="#f85149" font-family="system-ui, sans-serif" font-size="9" text-decoration="line-through">replaced</text>

  <text x="560" y="305" fill="#8b949e" font-family="system-ui, sans-serif" font-size="9">v2: "Use Riverpod for state"</text>
  <text x="700" y="305" fill="#f0883e" font-family="system-ui, sans-serif" font-size="9">evolved</text>

  <text x="560" y="320" fill="#e6edf3" font-family="system-ui, sans-serif" font-size="9" font-weight="bold">v3: "Use Riverpod + code gen"</text>
  <text x="700" y="320" fill="#3fb950" font-family="system-ui, sans-serif" font-size="9" font-weight="bold">current</text>

  <text x="665" y="340" text-anchor="middle" fill="#8b949e" font-family="system-ui, sans-serif" font-size="8">All versions preserved in fact_revisions table</text>

  <!-- ===== BOTTOM: Key Insight ===== -->
  <rect x="15" y="365" width="770" height="70" rx="8" fill="#161b22" stroke="#d2a8ff" stroke-width="1"/>
  <text x="400" y="390" text-anchor="middle" fill="#e6edf3" font-family="system-ui, sans-serif" font-size="13" font-weight="bold">Why This Works: Conversations are Ephemeral, Facts are Persistent</text>
  <text x="400" y="410" text-anchor="middle" fill="#8b949e" font-family="system-ui, sans-serif" font-size="10">Each session extracts max 20 facts (confidence &gt; 0.7). Over time, repeated patterns become strong memories.</text>
  <text x="400" y="425" text-anchor="middle" fill="#8b949e" font-family="system-ui, sans-serif" font-size="10">Contradictions are resolved automatically. Knowledge evolves as your decisions change. Nothing is forgotten.</text>
</svg>

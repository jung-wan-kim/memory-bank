<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 700" width="800" height="700">
  <defs>
    <linearGradient id="bgG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/><stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="blG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f6feb"/><stop offset="100%" style="stop-color:#58a6ff"/>
    </linearGradient>
    <linearGradient id="grG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#238636"/><stop offset="100%" style="stop-color:#3fb950"/>
    </linearGradient>
    <linearGradient id="puG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/><stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="orG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d18616"/><stop offset="100%" style="stop-color:#f0883e"/>
    </linearGradient>
    <filter id="s1"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.5"/></filter>
    <marker id="m1" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="8" orient="auto"><path d="M0 0L10 3L0 6z" fill="#58a6ff"/></marker>
    <marker id="m2" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="8" orient="auto"><path d="M0 0L10 3L0 6z" fill="#d2a8ff"/></marker>
    <marker id="m3" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="8" orient="auto"><path d="M0 0L10 3L0 6z" fill="#3fb950"/></marker>
    <marker id="m4" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="8" orient="auto"><path d="M0 0L10 3L0 6z" fill="#f0883e"/></marker>
    <marker id="m5" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="8" orient="auto"><path d="M0 0L10 3L0 6z" fill="#8b949e"/></marker>
  </defs>

  <rect width="800" height="700" rx="12" fill="url(#bgG)"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" fill="#e6edf3" font-family="system-ui, sans-serif" font-size="20" font-weight="bold">How Claude Code Remembers Across Sessions</text>
  <text x="400" y="54" text-anchor="middle" fill="#8b949e" font-family="system-ui, sans-serif" font-size="12">prompt → context → memory-bank → context → prompt</text>

  <!-- ============================================= -->
  <!-- SESSION 1: Normal conversation (no memory yet) -->
  <!-- ============================================= -->
  <rect x="20" y="70" width="760" height="230" rx="10" fill="#0d1117" stroke="#58a6ff" stroke-width="1.5"/>
  <rect x="20" y="70" width="760" height="28" rx="10" fill="#1f6feb" opacity="0.12"/>
  <circle cx="38" cy="84" r="5" fill="#58a6ff"/>
  <text x="50" y="89" fill="#58a6ff" font-family="system-ui, sans-serif" font-size="13" font-weight="bold">SESSION 1 — Flutter Project</text>
  <text x="710" y="89" text-anchor="end" fill="#8b949e" font-family="system-ui, sans-serif" font-size="11">No memory yet</text>

  <!-- User prompt -->
  <rect x="40" y="108" width="200" height="44" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1"/>
  <text x="50" y="126" fill="#8b949e" font-family="system-ui, sans-serif" font-size="9">User prompt</text>
  <text x="50" y="143" fill="#e6edf3" font-family="'SF Mono', monospace" font-size="11">"Use Riverpod for state"</text>

  <!-- Arrow: prompt → context -->
  <line x1="240" y1="130" x2="278" y2="130" stroke="#58a6ff" stroke-width="2" marker-end="url(#m1)"/>

  <!-- Context Window -->
  <rect x="282" y="105" width="220" height="70" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="392" y="122" text-anchor="middle" fill="#58a6ff" font-family="system-ui, sans-serif" font-size="10" font-weight="bold">Claude Code Context Window</text>
  <text x="292" y="139" fill="#8b949e" font-family="'SF Mono', monospace" font-size="9">system prompt</text>
  <text x="292" y="153" fill="#e6edf3" font-family="'SF Mono', monospace" font-size="9">user: "Use Riverpod for state"</text>
  <text x="292" y="167" fill="#8b949e" font-family="'SF Mono', monospace" font-size="9">(no memory available)</text>

  <!-- Arrow: context → response -->
  <line x1="502" y1="130" x2="538" y2="130" stroke="#58a6ff" stroke-width="2" marker-end="url(#m1)"/>

  <!-- Claude response -->
  <rect x="542" y="108" width="220" height="44" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="1"/>
  <text x="552" y="126" fill="#8b949e" font-family="system-ui, sans-serif" font-size="9">Claude response</text>
  <text x="552" y="143" fill="#3fb950" font-family="'SF Mono', monospace" font-size="11">"Setting up Riverpod..."</text>

  <!-- Session End Hook -->
  <rect x="40" y="188" width="722" height="28" rx="6" fill="#d2a8ff" opacity="0.08"/>
  <rect x="40" y="188" width="722" height="28" rx="6" fill="none" stroke="#d2a8ff" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="400" y="207" text-anchor="middle" fill="#d2a8ff" font-family="system-ui, sans-serif" font-size="12" font-weight="bold">SESSION END HOOK fires automatically</text>

  <!-- Arrow: hook → extract -->
  <line x1="400" y1="216" x2="400" y2="234" stroke="#d2a8ff" stroke-width="2" marker-end="url(#m2)"/>

  <!-- Extraction row -->
  <rect x="80" y="237" width="140" height="50" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="150" y="256" text-anchor="middle" fill="#e6edf3" font-family="system-ui, sans-serif" font-size="10">Conversation</text>
  <text x="150" y="270" text-anchor="middle" fill="#8b949e" font-family="system-ui, sans-serif" font-size="9">full JSONL</text>

  <line x1="220" y1="262" x2="258" y2="262" stroke="#d2a8ff" stroke-width="1.5" marker-end="url(#m2)"/>

  <rect x="262" y="237" width="120" height="50" rx="6" fill="url(#puG)" filter="url(#s1)"/>
  <text x="322" y="258" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Haiku LLM</text>
  <text x="322" y="273" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-family="system-ui, sans-serif" font-size="9">extract facts</text>

  <line x1="382" y1="262" x2="418" y2="262" stroke="#d2a8ff" stroke-width="1.5" marker-end="url(#m2)"/>

  <rect x="422" y="237" width="300" height="50" rx="6" fill="#161b22" stroke="#3fb950" stroke-width="1"/>
  <text x="432" y="254" fill="#3fb950" font-family="'SF Mono', monospace" font-size="9" font-weight="bold">decision:</text>
  <text x="498" y="254" fill="#e6edf3" font-family="'SF Mono', monospace" font-size="9">"Use Riverpod"</text>
  <rect x="627" y="244" width="48" height="16" rx="4" fill="#238636" opacity="0.3"/>
  <text x="651" y="255" text-anchor="middle" fill="#3fb950" font-family="'SF Mono', monospace" font-size="8">project</text>
  <text x="432" y="274" fill="#d2a8ff" font-family="'SF Mono', monospace" font-size="9" font-weight="bold">preference:</text>
  <text x="512" y="274" fill="#e6edf3" font-family="'SF Mono', monospace" font-size="9">"Korean responses"</text>
  <rect x="627" y="264" width="48" height="16" rx="4" fill="#8b5cf6" opacity="0.3"/>
  <text x="651" y="275" text-anchor="middle" fill="#d2a8ff" font-family="'SF Mono', monospace" font-size="8">global</text>

  <!-- ============================================= -->
  <!-- SQLite - The persistent bridge -->
  <!-- ============================================= -->

  <!-- Big down arrow -->
  <line x1="400" y1="300" x2="400" y2="340" stroke="#f0883e" stroke-width="3" marker-end="url(#m4)"/>
  <text x="430" y="318" fill="#f0883e" font-family="system-ui, sans-serif" font-size="11" font-weight="bold">STORE</text>

  <!-- SQLite box -->
  <rect x="220" y="345" width="360" height="55" rx="10" fill="url(#grG)" filter="url(#s1)"/>
  <text x="400" y="368" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="14" font-weight="bold">SQLite + sqlite-vec (Local DB)</text>
  <text x="400" y="386" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="system-ui, sans-serif" font-size="10">facts + 384-dim embeddings | Persists between sessions</text>

  <!-- Big down arrow -->
  <line x1="400" y1="400" x2="400" y2="440" stroke="#3fb950" stroke-width="3" marker-end="url(#m3)"/>
  <text x="430" y="418" fill="#3fb950" font-family="system-ui, sans-serif" font-size="11" font-weight="bold">LOAD</text>

  <!-- ============================================= -->
  <!-- SESSION 2: With memory! -->
  <!-- ============================================= -->
  <rect x="20" y="445" width="760" height="240" rx="10" fill="#0d1117" stroke="#3fb950" stroke-width="1.5"/>
  <rect x="20" y="445" width="760" height="28" rx="10" fill="#238636" opacity="0.12"/>
  <circle cx="38" cy="459" r="5" fill="#3fb950"/>
  <text x="50" y="464" fill="#3fb950" font-family="system-ui, sans-serif" font-size="13" font-weight="bold">SESSION 2 — Same Flutter Project (next day)</text>
  <text x="710" y="464" text-anchor="end" fill="#3fb950" font-family="system-ui, sans-serif" font-size="11" font-weight="bold">With memory!</text>

  <!-- Session Start Hook -->
  <rect x="40" y="480" width="722" height="28" rx="6" fill="#3fb950" opacity="0.08"/>
  <rect x="40" y="480" width="722" height="28" rx="6" fill="none" stroke="#3fb950" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="400" y="499" text-anchor="middle" fill="#3fb950" font-family="system-ui, sans-serif" font-size="12" font-weight="bold">SESSION START HOOK fires → Load top 10 facts into context</text>

  <!-- User prompt -->
  <rect x="40" y="520" width="200" height="44" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1"/>
  <text x="50" y="538" fill="#8b949e" font-family="system-ui, sans-serif" font-size="9">User prompt</text>
  <text x="50" y="555" fill="#e6edf3" font-family="'SF Mono', monospace" font-size="11">"Add authentication"</text>

  <!-- Arrow: prompt → context -->
  <line x1="240" y1="542" x2="278" y2="542" stroke="#58a6ff" stroke-width="2" marker-end="url(#m1)"/>

  <!-- Context Window WITH MEMORY (highlighted) -->
  <rect x="282" y="515" width="220" height="90" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="2"/>
  <rect x="282" y="515" width="220" height="90" rx="8" fill="#3fb950" opacity="0.04"/>
  <text x="392" y="532" text-anchor="middle" fill="#3fb950" font-family="system-ui, sans-serif" font-size="10" font-weight="bold">Context Window + MEMORY</text>
  <text x="292" y="548" fill="#8b949e" font-family="'SF Mono', monospace" font-size="9">system prompt</text>

  <!-- Memory facts highlighted -->
  <rect x="289" y="554" width="206" height="30" rx="4" fill="#3fb950" opacity="0.1"/>
  <text x="295" y="567" fill="#3fb950" font-family="'SF Mono', monospace" font-size="9" font-weight="bold">MEMORY: "Use Riverpod"</text>
  <text x="295" y="579" fill="#d2a8ff" font-family="'SF Mono', monospace" font-size="9" font-weight="bold">MEMORY: "Korean responses"</text>

  <text x="292" y="597" fill="#e6edf3" font-family="'SF Mono', monospace" font-size="9">user: "Add authentication"</text>

  <!-- Arrow: context → response -->
  <line x1="502" y1="555" x2="538" y2="555" stroke="#3fb950" stroke-width="2" marker-end="url(#m3)"/>

  <!-- Claude response WITH memory -->
  <rect x="542" y="520" width="220" height="65" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="552" y="538" fill="#8b949e" font-family="system-ui, sans-serif" font-size="9">Claude response (with memory!)</text>
  <text x="552" y="556" fill="#3fb950" font-family="'SF Mono', monospace" font-size="11">"Riverpod 기반으로"</text>
  <text x="552" y="572" fill="#3fb950" font-family="'SF Mono', monospace" font-size="11">"인증 설정합니다..."</text>

  <!-- Callout: knows Riverpod + Korean -->
  <rect x="555" y="588" width="195" height="22" rx="4" fill="#f0883e" opacity="0.15"/>
  <text x="652" y="603" text-anchor="middle" fill="#f0883e" font-family="system-ui, sans-serif" font-size="9" font-weight="bold">Remembers Riverpod! Responds in Korean!</text>

  <!-- Arrow: session 2 also saves -->
  <text x="400" y="660" text-anchor="middle" fill="#8b949e" font-family="system-ui, sans-serif" font-size="10">Session 2 ends → new facts extracted → consolidated with existing → memory grows stronger</text>

  <!-- Cycle arrow on right side -->
  <path d="M 765 300 Q 790 300 790 345 L 790 395 Q 790 440 765 440" fill="none" stroke="#f0883e" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="795" y="370" fill="#f0883e" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" transform="rotate(90, 795, 370)">persist</text>

  <!-- Loop indicator on left -->
  <path d="M 35 300 Q 10 300 10 345 L 10 395 Q 10 440 35 440" fill="none" stroke="#3fb950" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="5" y="370" fill="#3fb950" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" transform="rotate(-90, 5, 370)">recall</text>

  <!-- Bottom: key insight -->
  <rect x="100" y="672" width="600" height="22" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="400" y="687" text-anchor="middle" fill="#8b949e" font-family="system-ui, sans-serif" font-size="10">Hooks run automatically. No user action needed. Memory builds itself over time.</text>
</svg>

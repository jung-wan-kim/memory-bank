// LAYER BTN
var lyE=document.getElementById('layers');
var lyD=[{k:'ontology',l:'Ontology',d:'Domains · Categories',c:'#bf7af0'},{k:'project',l:'Projects',d:'Clusters · Relations',c:'#3b82f6'},{k:'source',l:'User Scope',d:'Global · Preferences',c:'#22c55e'}];
var aL={ontology:true,project:true,source:true};
lyD.forEach(function(ld){var b=document.createElement('div');b.className='lbtn on';b.style.setProperty('--lc',ld.c);
var nm=document.createElement('div');nm.className='nm';nm.textContent=ld.l;b.appendChild(nm);
var ds=document.createElement('div');ds.className='desc';ds.textContent=ld.d;b.appendChild(ds);
b.addEventListener('click',function(){aL[ld.k]=!aL[ld.k];b.classList.toggle('on',aL[ld.k])});lyE.appendChild(b)});

// FORCE LAYOUT
for(var i=0;i<N.length;i++){var th=Math.random()*Math.PI*2,r=35+Math.random()*50;N[i].x=r*Math.cos(th);N[i].z=r*Math.sin(th);N[i].y=LY[N[i].ly]+(Math.random()-.5)*25}
for(var it=0;it<350;it++){var al=.4*(1-it/350);
for(var i=0;i<N.length;i++)for(var j=i+1;j<N.length;j++){if(N[i].ly!==N[j].ly)continue;var dx=N[j].x-N[i].x,dz=N[j].z-N[i].z,di=Math.sqrt(dx*dx+dz*dz)||1,f=400/(di*di)*al;N[i].vx-=dx/di*f;N[i].vz-=dz/di*f;N[j].vx+=dx/di*f;N[j].vz+=dz/di*f}
for(var i=0;i<E.length;i++){var e=E[i];if(e.s.ly!==e.t.ly)continue;var dx=e.t.x-e.s.x,dz=e.t.z-e.s.z,di=Math.sqrt(dx*dx+dz*dz)||1,f=(di-25)*.015*al*Math.min(e.w,4);e.s.vx+=dx/di*f;e.s.vz+=dz/di*f;e.t.vx-=dx/di*f;e.t.vz-=dz/di*f}
for(var i=0;i<N.length;i++){var n=N[i];if(n.t==='project'&&n.dom&&dN[n.dom]){n.vx+=(dN[n.dom].x-n.x)*.004*al;n.vz+=(dN[n.dom].z-n.z)*.004*al}
n.vx-=n.x*.002*al;n.vz-=n.z*.002*al;n.vy=(LY[n.ly]-n.y)*.12;n.x+=n.vx;n.y+=n.vy;n.z+=n.vz;n.vx*=.5;n.vy*=.5;n.vz*=.5}}

// RENDERER
var cv=document.getElementById('c'),cx=cv.getContext('2d'),W,H;
function rsz(){W=cv.width=innerWidth;H=cv.height=innerHeight}rsz();addEventListener('resize',rsz);
var rX=-.32,rY=.5,zm=3.6,drg=false,lx=0,ly2=0,ar=true,mx=-1,my=-1,frame=0;
cv.onmousedown=function(e){drg=true;lx=e.clientX;ly2=e.clientY;ar=false;document.body.classList.add('dragging')};
cv.onmousemove=function(e){mx=e.clientX;my=e.clientY;if(drg){rY+=(e.clientX-lx)*.003;rX+=(e.clientY-ly2)*.003;rX=Math.max(-1.1,Math.min(1.1,rX));lx=e.clientX;ly2=e.clientY}};
cv.onmouseup=function(){drg=false;document.body.classList.remove('dragging')};
cv.onmouseleave=function(){drg=false;mx=-1;my=-1;document.body.classList.remove('dragging')};
cv.addEventListener('wheel',function(e){zm*=e.deltaY>0?.93:1.07;zm=Math.max(1.5,Math.min(12,zm));e.preventDefault()},{passive:false});
cv.addEventListener('touchstart',function(e){if(e.touches.length===1){drg=true;lx=e.touches[0].clientX;ly2=e.touches[0].clientY;ar=false}},{passive:true});
cv.addEventListener('touchmove',function(e){if(drg&&e.touches.length===1){var t=e.touches[0];rY+=(t.clientX-lx)*.003;rX+=(t.clientY-ly2)*.003;rX=Math.max(-1.1,Math.min(1.1,rX));lx=t.clientX;ly2=t.clientY}},{passive:true});
cv.addEventListener('touchend',function(){drg=false});

function pj(x,y,z){var x1=x*Math.cos(rY)-z*Math.sin(rY),z1=x*Math.sin(rY)+z*Math.cos(rY),y1=y*Math.cos(rX)-z1*Math.sin(rX),z2=y*Math.sin(rX)+z1*Math.cos(rX),p=600,s=p/(p+z2)*zm;return{sx:W/2+x1*s,sy:H/2+y1*s,s:s,z:z2}}

function render(){
frame++;
if(ar)rY+=.001;
cx.clearRect(0,0,W,H);

// BG
cx.fillStyle='#05080d';cx.fillRect(0,0,W,H);

// LAYER GRIDS — neon grid planes
var lyKeys=['source','project','ontology'];
var lyColors={source:'#22c55e',project:'#3b82f6',ontology:'#bf7af0'};
var lyLabels={source:'USER SCOPE',project:'PROJECT LAYER',ontology:'ONTOLOGY LAYER'};
for(var li=0;li<lyKeys.length;li++){var lk=lyKeys[li];if(!aL[lk])continue;
var yy=LY[lk],col=lyColors[lk];
// Draw grid lines
var gridSize=120,step=20;
for(var gx=-gridSize;gx<=gridSize;gx+=step){
var p1=pj(gx,yy,-gridSize),p2=pj(gx,yy,gridSize);
cx.beginPath();cx.moveTo(p1.sx,p1.sy);cx.lineTo(p2.sx,p2.sy);
cx.strokeStyle=rgba(col,.04);cx.lineWidth=.5;cx.stroke()}
for(var gz=-gridSize;gz<=gridSize;gz+=step){
var p1=pj(-gridSize,yy,gz),p2=pj(gridSize,yy,gz);
cx.beginPath();cx.moveTo(p1.sx,p1.sy);cx.lineTo(p2.sx,p2.sy);
cx.strokeStyle=rgba(col,.04);cx.lineWidth=.5;cx.stroke()}
// Boundary glow
var corners=[pj(-gridSize,yy,-gridSize),pj(gridSize,yy,-gridSize),pj(gridSize,yy,gridSize),pj(-gridSize,yy,gridSize)];
cx.beginPath();cx.moveTo(corners[0].sx,corners[0].sy);for(var ci=1;ci<4;ci++)cx.lineTo(corners[ci].sx,corners[ci].sy);cx.closePath();
cx.strokeStyle=rgba(col,.12);cx.lineWidth=1;cx.shadowColor=col;cx.shadowBlur=8;cx.stroke();cx.shadowBlur=0;
// Label
var lp=pj(-gridSize+5,yy,-gridSize+5);
cx.fillStyle=rgba(col,.35);cx.font='bold 9px "SF Mono",Menlo,monospace';cx.textAlign='left';cx.fillText(lyLabels[lk],lp.sx,lp.sy-4)}

// DATA FLOW ARROWS (animated particles flowing between layers)
var flowTime=frame*.02;
// source→project flow
if(aL.source&&aL.project){
for(var fi=0;fi<8;fi++){
var t=((flowTime+fi*.125)%1);
var fx=(Math.sin(fi*2.3))*40;
var fz=(Math.cos(fi*1.7))*40;
var fy=LY.source+(LY.project-LY.source)*t;
var fp=pj(fx,fy,fz);
var pr=1.5*fp.s;var fa=Math.sin(t*Math.PI)*.5;
cx.beginPath();cx.arc(fp.sx,fp.sy,pr,0,Math.PI*2);
cx.fillStyle=rgba('#22c55e',fa);cx.shadowColor='#22c55e';cx.shadowBlur=6;cx.fill();cx.shadowBlur=0}}
// project→ontology flow
if(aL.project&&aL.ontology){
for(var fi=0;fi<8;fi++){
var t=((flowTime*.8+fi*.125)%1);
var fx=(Math.sin(fi*1.9+1))*40;
var fz=(Math.cos(fi*2.1+1))*40;
var fy=LY.project+(LY.ontology-LY.project)*t;
var fp=pj(fx,fy,fz);
var pr=1.5*fp.s;var fa=Math.sin(t*Math.PI)*.5;
cx.beginPath();cx.arc(fp.sx,fp.sy,pr,0,Math.PI*2);
cx.fillStyle=rgba('#bf7af0',fa);cx.shadowColor='#bf7af0';cx.shadowBlur=6;cx.fill();cx.shadowBlur=0}}

var vN=N.filter(function(n){return aL[n.ly]});
var vE=E.filter(function(e){return aL[e.s.ly]&&aL[e.t.ly]});

// EDGES
for(var i=0;i<vE.length;i++){var e=vE[i],s=pj(e.s.x,e.s.y,e.s.z),t=pj(e.t.x,e.t.y,e.t.z);
var rs=RS[e.tp]||RS.SHARES;var cl=e.s.ly!==e.t.ly;
var ba=cl?.04:.08;
var a=Math.max(.01,Math.min(.2,ba-(s.z+t.z)/2*.0002))*Math.min(e.w/4,1);
cx.beginPath();cx.moveTo(s.sx,s.sy);cx.lineTo(t.sx,t.sy);
cx.strokeStyle=rgba(rs.c,a);cx.lineWidth=Math.max(.3,Math.min(e.w*.12,1.5)*s.s);
cx.shadowColor=rs.c;cx.shadowBlur=cl?0:3;
cx.setLineDash(rs.d);cx.stroke();cx.setLineDash([]);cx.shadowBlur=0;
// Animated flow dot on cross-layer edges
if(cl&&a>.02){var ft=((frame*.015+i*.1)%1);var fx2=s.sx+(t.sx-s.sx)*ft;var fy2=s.sy+(t.sy-s.sy)*ft;
cx.beginPath();cx.arc(fx2,fy2,1.2*s.s,0,Math.PI*2);cx.fillStyle=rgba(rs.c,Math.sin(ft*Math.PI)*.4);cx.fill()}}

// NODES
var hov=null,mnd=30;
var pArr=vN.map(function(n){var p=pj(n.x,n.y,n.z);return{id:n.id,t:n.t,nm:n.nm,c:n.c,sz:n.sz,ly:n.ly,dom:n.dom,dt:n.dt,sx:p.sx,sy:p.sy,s:p.s,z:p.z}});
pArr.sort(function(a,b){return a.z-b.z});

for(var i=0;i<pArr.length;i++){var n=pArr[i];
var r=n.sz*n.s*.3;
var a=Math.max(.15,Math.min(1,.8-n.z*.001));
var pulse=1+Math.sin(frame*.03+i)*.05;

// Neon glow
cx.shadowColor=n.c;cx.shadowBlur=r*3*a;

if(n.t==='domain'){
// Diamond
cx.save();cx.translate(n.sx,n.sy);cx.rotate(Math.PI/4);var ds=r*pulse;
cx.fillStyle=rgba(n.c,.12*a);cx.strokeStyle=rgba(n.c,.7*a);cx.lineWidth=1;
cx.fillRect(-ds,-ds,ds*2,ds*2);cx.strokeRect(-ds,-ds,ds*2,ds*2);cx.restore()}
else if(n.t==='category'){
cx.beginPath();for(var k=0;k<6;k++){var ag=Math.PI/3*k-Math.PI/6,px=n.sx+r*pulse*Math.cos(ag),py=n.sy+r*pulse*Math.sin(ag);k===0?cx.moveTo(px,py):cx.lineTo(px,py)}cx.closePath();
cx.fillStyle=rgba(n.c,.1*a);cx.strokeStyle=rgba(n.c,.6*a);cx.lineWidth=.8;cx.fill();cx.stroke()}
else if(n.t==='fact'){
cx.beginPath();cx.arc(n.sx,n.sy,r*pulse,0,Math.PI*2);cx.strokeStyle=rgba(n.c,.6*a);cx.lineWidth=1;cx.stroke();
cx.beginPath();cx.arc(n.sx,n.sy,r*.35,0,Math.PI*2);cx.fillStyle=rgba(n.c,.9*a);cx.fill()}
else{
cx.beginPath();cx.arc(n.sx,n.sy,r*pulse,0,Math.PI*2);cx.fillStyle=rgba(n.c,.8*a);cx.fill();
cx.strokeStyle=rgba(n.c,.4*a);cx.lineWidth=.5;cx.stroke()}

cx.shadowBlur=0;

// Label
if(r>2){cx.fillStyle=rgba('#c9d1d9',Math.min(.6,r/6)*a);
cx.font=(n.t==='domain'?'bold ':'')+Math.max(7,Math.min(11,r*.9))+'px -apple-system,sans-serif';
cx.textAlign='center';var lb=n.nm.length>18?n.nm.slice(0,16)+'..':n.nm;
cx.fillText(lb,n.sx,n.sy+r+(n.t==='domain'?14:10))}

if(mx>=0){var dx=mx-n.sx,dy=my-n.sy,dd=Math.sqrt(dx*dx+dy*dy);if(dd<Math.max(r+8,mnd)){mnd=dd;hov=n}}}

// TOOLTIP
var tt=document.getElementById('tt');
if(hov&&!drg){tt.style.display='block';tt.style.left=Math.min(mx+14,W-340)+'px';tt.style.top=Math.min(my+14,H-220)+'px';
document.getElementById('tDot').style.background=hov.c;document.getElementById('tDot').style.setProperty('--nc',hov.c);document.getElementById('tDot').style.boxShadow='0 0 6px '+hov.c;
var tn=document.getElementById('tNm');tn.textContent=hov.nm;tn.style.color=hov.c;
var ts=document.getElementById('tSc');var ll={source:'USER',project:'PROJECT',ontology:'ONTOLOGY'};ts.textContent=ll[hov.ly]||'';ts.style.background=rgba(hov.c,.15);ts.style.color=hov.c;
var tb=document.getElementById('tBd');tb.textContent='';
if(hov.t==='project'){['Domain: '+(hov.dom||'?'),'Exchanges: '+(hov.dt.ex||0).toLocaleString(),'Sessions: '+(hov.dt.sess||'?')].forEach(function(l){var d=document.createElement('div');d.textContent=l;tb.appendChild(d)});if(hov.dt.f){var d=document.createElement('div');d.textContent=hov.dt.f.slice(0,10)+' ~ '+(hov.dt.l||'').slice(0,10);tb.appendChild(d)}}
else if(hov.t==='domain'){tb.textContent=pN.filter(function(n){return n.dom===hov.nm}).length+' projects'}
else if(hov.t==='fact'){tb.textContent='Scope: Global · '+hov.dt.cat}
else if(hov.t==='category'){tb.textContent='Tool Category'}
// Tools
var tTx=document.getElementById('tTx'),tTg=document.getElementById('tTg');tTg.textContent='';
if(hov.dt.tools&&hov.dt.tools.length>0){tTx.style.display='block';document.getElementById('tTxT').textContent='Tools';
hov.dt.tools.slice(0,8).forEach(function(t){var tg=document.createElement('span');tg.className='tg';tg.textContent=t;tg.style.background=rgba('#3b82f6',.1);tg.style.color='#3b82f6';tTg.appendChild(tg)});
if(hov.dt.cats)hov.dt.cats.forEach(function(c){var ci=TCAT[c];var tg=document.createElement('span');tg.className='tg';tg.textContent=c;tg.style.background=rgba(ci?ci.c:'#484f58',.15);tg.style.color=ci?ci.c:'#484f58';tTg.appendChild(tg)})}else{tTx.style.display='none'}
// Rels
var tRx=document.getElementById('tRx'),tRl=document.getElementById('tRl');tRl.textContent='';
var rels=vE.filter(function(e){return e.s.id===hov.id||e.t.id===hov.id});
if(rels.length>0){tRx.style.display='block';var sh=0;
for(var ri=0;ri<rels.length&&sh<5;ri++){var rl=rels[ri],oth=rl.s.id===hov.id?rl.t:rl.s;var rs2=RS[rl.tp]||RS.SHARES;
var rw=document.createElement('div');rw.className='rl-row';
var bg=document.createElement('span');bg.className='rl-badge';bg.textContent=rl.tp;bg.style.background=rgba(rs2.c,.2);bg.style.color=rs2.c;bg.style.boxShadow='0 0 4px '+rgba(rs2.c,.3);
rw.appendChild(bg);rw.appendChild(document.createTextNode(' '+oth.nm));tRl.appendChild(rw);sh++}
if(rels.length>5){var mr=document.createElement('div');mr.style.cssText='font-size:9px;color:#30363d;margin-top:2px';mr.textContent='+'+(rels.length-5)+' more';tRl.appendChild(mr)}}
else{tRx.style.display='none'}
}else{tt.style.display='none'}

requestAnimationFrame(render)}
render();
</script>
</body>

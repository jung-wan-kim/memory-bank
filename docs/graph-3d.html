  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #8b949e; }

  { match: /claude|cc-sync|memory-bank|episodic|config-editor|insights/i, domain: "Claude Ecosystem", color: "#d2a8ff" },
  { match: /article|artricle|docs/i, domain: "Article21", color: "#f0883e" },

];

function classifyProject(name) {
  for (const rule of domainRules) {
    if (rule.match.test(name)) return { domain: rule.domain, color: rule.color };
  }
  return { domain: "Other", color: "#8b949e" };
}

  const tools = GRAPH_DATA.toolUsage.filter(t => t.project === p.project).map(t => t.tool_name.replace(/mcp__[^_]+_[^_]+__/, ''));
  const size = Math.max(3, Math.min(18, Math.log2(p.exchanges) * 2.5));
  const node = { id: p.project, name: shortName, domain, color, size, exchanges: p.exchanges, tools, x: 0, y: 0, z: 0, vx: 0, vy: 0, vz: 0 };
  nodes.push(node);
  nodeMap.set(p.project, node);
}

for (const c of GRAPH_DATA.connections) {
  if (nodeMap.has(c.source) && nodeMap.has(c.target)) {
    edges.push({ source: nodeMap.get(c.source), target: nodeMap.get(c.target), weight: c.weight });
  }
}

// Stats
document.getElementById('s-nodes').textContent = nodes.length;
document.getElementById('s-edges').textContent = edges.length;
document.getElementById('s-exchanges').textContent = GRAPH_DATA.projects.reduce(function(s, p) { return s + p.exchanges; }, 0).toLocaleString();

// Legend (safe DOM manipulation)
const domains = [...new Set(nodes.map(function(n) { return n.domain; }))].sort();
const legendEl = document.getElementById('legend');
for (const d of domains) {
  const color = nodes.find(function(n) { return n.domain === d; })?.color || '#8b949e';
  const item = document.createElement('div');
  item.className = 'legend-item';
  const dot = document.createElement('div');
  dot.className = 'legend-dot';
  dot.style.background = color;
  item.appendChild(dot);
  item.appendChild(document.createTextNode(d));
  legendEl.appendChild(item);
}

// ===== FORCE SIMULATION =====
for (const n of nodes) {
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  const r = 80 + Math.random() * 40;
  n.x = r * Math.sin(phi) * Math.cos(theta);
  n.y = r * Math.sin(phi) * Math.sin(theta);
  n.z = r * Math.cos(phi);
}

function simulate(iterations) {
  for (let iter = 0; iter < iterations; iter++) {
    const alpha = 0.3 * (1 - iter / iterations);
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i + 1; j < nodes.length; j++) {
        const dx = nodes[j].x - nodes[i].x;
        const dy = nodes[j].y - nodes[i].y;
        const dz = nodes[j].z - nodes[i].z;
        const dist = Math.sqrt(dx*dx + dy*dy + dz*dz) || 1;
        const force = 800 / (dist * dist) * alpha;
        nodes[i].vx -= dx / dist * force; nodes[i].vy -= dy / dist * force; nodes[i].vz -= dz / dist * force;
        nodes[j].vx += dx / dist * force; nodes[j].vy += dy / dist * force; nodes[j].vz += dz / dist * force;
      }
    }
    for (const e of edges) {
      const dx = e.target.x - e.source.x;
      const dy = e.target.y - e.source.y;
      const dz = e.target.z - e.source.z;
      const dist = Math.sqrt(dx*dx + dy*dy + dz*dz) || 1;
      const force = (dist - 40) * 0.02 * alpha * e.weight;
      e.source.vx += dx/dist*force; e.source.vy += dy/dist*force; e.source.vz += dz/dist*force;
      e.target.vx -= dx/dist*force; e.target.vy -= dy/dist*force; e.target.vz -= dz/dist*force;
    }
    for (const n of nodes) {
      n.vx -= n.x * 0.005 * alpha; n.vy -= n.y * 0.005 * alpha; n.vz -= n.z * 0.005 * alpha;
      n.x += n.vx; n.y += n.vy; n.z += n.vz;
      n.vx *= 0.6; n.vy *= 0.6; n.vz *= 0.6;
    }
  }
}
simulate(200);

// ===== 3D RENDERING =====
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

let rotX = -0.3, rotY = 0.5, zoom = 3.5;
let dragging = false, lastMX = 0, lastMY = 0;
let autoRotate = true;
let mouseX = -1, mouseY = -1;

canvas.addEventListener('mousedown', function(e) { dragging = true; lastMX = e.clientX; lastMY = e.clientY; autoRotate = false; });
canvas.addEventListener('mousemove', function(e) {
  mouseX = e.clientX; mouseY = e.clientY;
  if (dragging) {
    rotY += (e.clientX - lastMX) * 0.005;
    rotX += (e.clientY - lastMY) * 0.005;
    rotX = Math.max(-Math.PI/2, Math.min(Math.PI/2, rotX));
    lastMX = e.clientX; lastMY = e.clientY;
  }
});
canvas.addEventListener('mouseup', function() { dragging = false; });
canvas.addEventListener('mouseleave', function() { dragging = false; mouseX = -1; mouseY = -1; });
canvas.addEventListener('wheel', function(e) { zoom *= e.deltaY > 0 ? 0.95 : 1.05; zoom = Math.max(1, Math.min(10, zoom)); e.preventDefault(); }, { passive: false });

function project(x, y, z) {
  let x1 = x * Math.cos(rotY) - z * Math.sin(rotY);
  let z1 = x * Math.sin(rotY) + z * Math.cos(rotY);
  let y1 = y * Math.cos(rotX) - z1 * Math.sin(rotX);
  let z2 = y * Math.sin(rotX) + z1 * Math.cos(rotX);
  const perspective = 600;
  const scale = perspective / (perspective + z2) * zoom;
  return { sx: W/2 + x1 * scale, sy: H/2 + y1 * scale, scale: scale, z: z2 };
}

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
}

function render() {
  if (autoRotate) rotY += 0.002;
  ctx.clearRect(0, 0, W, H);

  // Background
  const grad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, W*0.6);
  grad.addColorStop(0, '#161b22');
  grad.addColorStop(1, '#0d1117');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Project nodes
  const projected = nodes.map(function(n) {
    const p = project(n.x, n.y, n.z);
    return Object.assign({}, n, p);
  });
  projected.sort(function(a, b) { return a.z - b.z; });

  // Edges
  for (const e of edges) {
    const s = project(e.source.x, e.source.y, e.source.z);
    const t = project(e.target.x, e.target.y, e.target.z);
    const avgZ = (s.z + t.z) / 2;
    const alpha = Math.max(0.04, Math.min(0.25, 0.15 - avgZ * 0.0005)) * (e.weight / 10);
    ctx.beginPath();
    ctx.moveTo(s.sx, s.sy);
    ctx.lineTo(t.sx, t.sy);
    ctx.strokeStyle = hexToRgba('#58a6ff', alpha);
    ctx.lineWidth = Math.max(0.5, e.weight * 0.15 * s.scale);
    ctx.stroke();
  }

  // Find hovered node
  let hoveredNode = null;
  let minDist = 30;

  // Nodes
  for (const n of projected) {
    const r = n.size * n.scale * 0.4;
    const alpha = Math.max(0.3, Math.min(1, 0.8 - n.z * 0.002));

    // Glow
    const glowGrad = ctx.createRadialGradient(n.sx, n.sy, 0, n.sx, n.sy, r * 3);
    glowGrad.addColorStop(0, hexToRgba(n.color, 0.15 * alpha));
    glowGrad.addColorStop(1, 'transparent');
    ctx.fillStyle = glowGrad;
    ctx.fillRect(n.sx - r*3, n.sy - r*3, r*6, r*6);

    // Circle
    ctx.beginPath();
    ctx.arc(n.sx, n.sy, r, 0, Math.PI * 2);
    ctx.fillStyle = hexToRgba(n.color, 0.9 * alpha);
    ctx.fill();
    ctx.strokeStyle = hexToRgba(n.color, 0.5 * alpha);
    ctx.lineWidth = 1;
    ctx.stroke();

    // Label
    if (r > 3) {
      ctx.fillStyle = hexToRgba('#e6edf3', 0.7 * alpha);
      ctx.font = Math.max(9, r * 1.2) + 'px -apple-system, sans-serif';
      ctx.textAlign = 'center';
      const label = n.name.length > 22 ? n.name.slice(0, 20) + '..' : n.name;
      ctx.fillText(label, n.sx, n.sy + r + 14);
    }

    // Hover
    if (mouseX >= 0) {
      const dx = mouseX - n.sx;
      const dy = mouseY - n.sy;
      const d = Math.sqrt(dx*dx + dy*dy);
      if (d < Math.max(r + 8, minDist)) { minDist = d; hoveredNode = n; }
    }
  }

  // Tooltip (safe DOM methods)
  const tt = document.getElementById('tooltip');
  if (hoveredNode && !dragging) {
    tt.style.display = 'block';
    tt.style.left = Math.min(mouseX + 16, W - 360) + 'px';
    tt.style.top = Math.min(mouseY + 16, H - 200) + 'px';

    const ttName = document.getElementById('tt-name');
    ttName.textContent = hoveredNode.name;
    ttName.style.color = hoveredNode.color;

    const ttMeta = document.getElementById('tt-meta');
    ttMeta.textContent = '';
    const domainLine = document.createElement('div');
    domainLine.textContent = 'Domain: ' + hoveredNode.domain;
    domainLine.style.color = hoveredNode.color;
    const exchLine = document.createElement('div');
    exchLine.textContent = 'Exchanges: ' + hoveredNode.exchanges.toLocaleString();
    const connLine = document.createElement('div');
    const connCount = edges.filter(function(e) { return e.source.id === hoveredNode.id || e.target.id === hoveredNode.id; }).length;
    connLine.textContent = 'Connections: ' + connCount;
    ttMeta.appendChild(domainLine);
    ttMeta.appendChild(exchLine);
    ttMeta.appendChild(connLine);

    const ttTools = document.getElementById('tt-tools');
    ttTools.textContent = '';
    hoveredNode.tools.slice(0, 8).forEach(function(t) {
      const tag = document.createElement('span');
      tag.className = 'tt-tag';
      tag.textContent = t;
      ttTools.appendChild(tag);
    });
  } else {
    tt.style.display = 'none';
  }

  requestAnimationFrame(render);
}
render();
</script>
</body>
</html>
